<!DOCTYPE html>
<html>
<head>
    <title>Visit Details</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 20px;
            font-size: 12px;
        }

        h2 {
            font-size: 18px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .search-box input {
            padding: 7px;
            width: 220px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .new-btn, .dash-btn {
            padding: 7px 12px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
        }

        .new-btn { background: #4CAF50; }
        .dash-btn { background: #2196F3; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 6px;
            overflow: hidden;
        }

        th {
            background: #4CAF50;
            color: white;
            padding: 8px;
        }

        td {
            padding: 6px;
            border-bottom: 1px solid #eee;
            vertical-align: top;
        }

        .btn {
            padding: 4px 6px;
            font-size: 11px;
            border: none;
            cursor: pointer;
            margin: 1px;
        }

        .edit { background: #2196F3; color: white; }
        .save { background: #4CAF50; color: white; }
        .delete { background: #f44336; color: white; }
        .cancel { background: #777; color: white; }

        input.edit-input {
            display: none;
            width: 100%;
            margin: 2px 0;
        }

        .patient-name {
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Visit Details</h2>

<div class="top-bar">

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search Patient..." onkeyup="searchPatient()">
    </div>

    <div>
        <a href="/form" class="new-btn">+ New Patient</a>
        <a href="/dashboard" class="dash-btn">Dashboard</a>
    </div>

</div>

<table>

<tr>
    <th>Patient Info</th>
    <th>Medical</th>
    <th>Vision</th>
    <th>Visit</th>
    <th>Actions</th>
</tr>

{% for d in data %}
<tr id="row-{{ d['id'] }}">

    <td>
        <b class="patient-name">{{ d['patient'] }}</b>
        <input class="edit-input" value="{{ d['patient'] }}">

        <input class="edit-input" type="date" value="{{ d['dob'] }}">
        <input class="edit-input" value="{{ d['status'] }}">
        <input class="edit-input" value="{{ d['work_type'] }}">
        <input class="edit-input" value="{{ d['hobbies'] }}">
    </td>

    <td>
        <input class="edit-input" value="{{ d['medical_insurance'] }}">
        <input class="edit-input" value="{{ d['medical_insurance_accepted'] }}">
    </td>

    <td>
        <input class="edit-input" value="{{ d['vision_goals'] }}">
        <input class="edit-input" value="{{ d['vision_insurance'] }}">
        <input class="edit-input" value="{{ d['vsp_essential_eye_care'] }}">
    </td>

    <td>
        <input class="edit-input" value="{{ d['reason'] }}">
        <input class="edit-input" type="date" value="{{ d['date'] }}">
    </td>

    <td>
        <button class="btn edit" onclick="editRow({{ d['id'] }})">Edit</button>
        <button class="btn save" style="display:none;" onclick="saveRow({{ d['id'] }})">Save</button>
        <button class="btn cancel" style="display:none;" onclick="location.reload()">Cancel</button>
        <button class="btn delete" onclick="deleteRow({{ d['id'] }})">Delete</button>
    </td>

</tr>
{% endfor %}

</table>

<script>
function editRow(id){
    let row = document.getElementById("row-"+id);
    row.querySelectorAll(".edit-input").forEach(i => i.style.display="block");

    row.querySelector(".edit").style.display="none";
    row.querySelector(".save").style.display="inline";
}

function saveRow(id){
    let row = document.getElementById("row-"+id);
    let i = row.querySelectorAll(".edit-input");

    fetch("/update/"+id,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            patient:i[0].value,
            dob:i[1].value,
            status:i[2].value,
            work_type:i[3].value,
            hobbies:i[4].value,
            medical_insurance:i[5].value,
            medical_insurance_accepted:i[6].value,
            vision_goals:i[7].value,
            vision_insurance:i[8].value,
            vsp_essential_eye_care:i[9].value,
            reason:i[10].value,
            date:i[11].value
        })
    }).then(()=>location.reload());
}

function deleteRow(id){
    fetch("/delete/"+id,{method:"POST"}).then(()=>location.reload());
}

function searchPatient(){
    let val = document.getElementById("searchInput").value.toLowerCase();
    document.querySelectorAll("tr[id^='row-']").forEach(r=>{
        let name=r.querySelector(".patient-name").innerText.toLowerCase();
        r.style.display = name.includes(val) ? "" : "none";
    });
}
</script>

</body>
</html>
