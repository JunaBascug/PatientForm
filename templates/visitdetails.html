<!DOCTYPE html>
<html>
<head>
    <title>Visit Details</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
            margin: 20px;
            font-size: 12px;
        }

        h2 { margin-bottom: 10px; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 6px 10px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
            font-size: 12px;
        }

        .green { background: #4CAF50; }
        .blue { background: #2196F3; }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
        }

        th {
            background: #4CAF50;
            color: white;
            padding: 8px;
        }

        td {
            padding: 6px;
            border-bottom: 1px solid #ddd;
        }

        input.edit-input {
            display: none;
        }
    </style>
</head>

<body>

<h2>Visit Details</h2>

<div class="top-bar">
    <div>
        <a class="btn green" href="/form">+ New Patient</a>
        <a class="btn blue" href="/dashboard">Dashboard</a>
    </div>
</div>

<table>
<tr>
    <th>Patient</th>
    <th>Medical</th>
    <th>Vision</th>
    <th>Visit</th>
    <th>Actions</th>
</tr>

{% for d in data %}
<tr id="row-{{ d['id'] }}">

    <td>
        {{ d['patient'] }}
    </td>

    <td>
        {{ d['medical_insurance'] }}
    </td>

    <td>
        {{ d['vision_goals'] }}
    </td>

    <td>
        {{ d['reason'] }} <br>
        {{ d['date'] }}
    </td>

    <td>
        <button onclick="deleteRow({{ d['id'] }})">Delete</button>
    </td>

</tr>
{% endfor %}

</table>

<script>
function deleteRow(id) {
    if (!confirm("Delete?")) return;

    fetch("/delete/" + id, { method: "POST" })
    .then(() => location.reload());
}
</script>

</body>
</html>
