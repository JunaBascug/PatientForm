<!DOCTYPE html>
<html>
<head>
    <title>New Patient Form</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
            margin: 30px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 500px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
        }

        a {
            display: inline-block;
            margin-top: 10px;
            color: #2196F3;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h2>New Patient Form</h2>

<div class="box">

<form method="POST" action="/add">

    <input name="patient" placeholder="Patient Name" required>

    <select name="patient_type">
        <option value="New">New Patient</option>
        <option value="Existing">Existing Patient</option>
    </select>

    <input type="date" name="dob" placeholder="DOB">
    <input name="status" placeholder="Status">
    <input name="work_type" placeholder="Work Type">
    <input name="hobbies" placeholder="Hobbies">

    <input name="vision_goals" placeholder="Vision Goals">
    <input name="vision_insurance" placeholder="Vision Insurance">

    <input name="medical_insurance" placeholder="Medical Insurance">
    <input name="medical_insurance_accepted" placeholder="Insurance Accepted">
    <input name="vsp_essential_eye_care" placeholder="VSP Eye Care">

    <input name="reason" placeholder="Reason for Visit">
    <input type="date" name="date">

    <button type="submit">Save Patient</button>

</form>

<a href="/visitdetails">Go to Visit Details</a> |
<a href="/dashboard">Dashboard</a>

</div>

</body>
</html>
