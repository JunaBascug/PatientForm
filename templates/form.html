<!DOCTYPE html>
<html>
<head>
    <title>New Patient Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h2 {
            margin: 0;
        }

        .nav a {
            margin-left: 10px;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: white;
        }

        .blue { background: #2196F3; }
        .green { background: #4CAF50; }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            font-size: 12px;
            color: #555;
            margin-bottom: 4px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            border-left: 4px solid #4CAF50;
            padding-left: 8px;
        }

        .full {
            grid-column: span 2;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #4CAF50;
            color: white;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>New Patient Form</h2>

    <div class="nav">
        <a class="blue" href="/visitdetails">Visit Details</a>
        <a class="green" href="/dashboard">Dashboard</a>
    </div>
</div>

<div class="container">

<form method="POST" action="/add">

    <!-- PATIENT INFO -->
    <div class="section">
        <div class="section-title">Patient Information</div>

        <div class="grid">
            <div>
                <label>Patient Name</label>
                <input name="patient" required>
            </div>

            <div>
                <label>Patient Type</label>
                <select name="patient_type">
                    <option value="New">New Patient</option>
                    <option value="Existing">Existing Patient</option>
                </select>
            </div>

            <div>
                <label>DOB</label>
                <input type="date" name="dob">
            </div>

            <div>
                <label>Status</label>
                <input name="status">
            </div>

            <div>
                <label>Work Type</label>
                <input name="work_type">
            </div>

            <div>
                <label>Hobbies</label>
                <input name="hobbies">
            </div>
        </div>
    </div>

    <!-- VISION -->
    <div class="section">
        <div class="section-title">Vision Information</div>

        <div class="grid">
            <div>
                <label>Vision Goals</label>
                <input name="vision_goals">
            </div>

            <div>
                <label>Vision Insurance</label>
                <input name="vision_insurance">
            </div>
        </div>
    </div>

    <!-- MEDICAL -->
    <div class="section">
        <div class="section-title">Medical Information</div>

        <div class="grid">
            <div>
                <label>Medical Insurance</label>
                <input name="medical_insurance">
            </div>

            <div>
                <label>Insurance Accepted</label>
                <input name="medical_insurance_accepted">
            </div>

            <div class="full">
                <label>VSP Eye Care</label>
                <input name="vsp_essential_eye_care">
            </div>
        </div>
    </div>

    <!-- VISIT -->
    <div class="section">
        <div class="section-title">Visit Details</div>

        <div class="grid">
            <div class="full">
                <label>Reason for Visit</label>
                <input name="reason">
            </div>

            <div>
                <label>Date</label>
                <input type="date" name="date">
            </div>
        </div>
    </div>

    <button type="submit">Save Patient</button>

</form>

</div>

</body>
</html>
