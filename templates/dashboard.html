<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
            margin: 30px;
        }

        h2 { margin-bottom: 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        .title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
        }

        .value {
            font-weight: bold;
            color: #4CAF50;
        }

        a {
            text-decoration: none;
            font-weight: bold;
            color: #2196F3;
            margin-right: 10px;
        }
    </style>
</head>

<body>

<h2>Dashboard</h2>

<div class="grid">

    <div class="card">
        <div class="title">Today</div>
        <div class="row">New <span class="value">{{ day_new }}</span></div>
        <div class="row">Existing <span class="value">{{ day_existing }}</span></div>
    </div>

    <div class="card">
        <div class="title">Week</div>
        <div class="row">New <span class="value">{{ week_new }}</span></div>
        <div class="row">Existing <span class="value">{{ week_existing }}</span></div>
    </div>

    <div class="card">
        <div class="title">Month</div>
        <div class="row">New <span class="value">{{ month_new }}</span></div>
        <div class="row">Existing <span class="value">{{ month_existing }}</span></div>
    </div>

    <div class="card">
        <div class="title">Year</div>
        <div class="row">New <span class="value">{{ year_new }}</span></div>
        <div class="row">Existing <span class="value">{{ year_existing }}</span></div>
    </div>

</div>

<br>

<a href="/form">New Patient</a>
<a href="/visitdetails">Visit Details</a>
<a href="/logout">Logout</a>

</body>
</html>
