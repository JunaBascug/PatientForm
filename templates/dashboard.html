<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
            margin: 30px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        .nav a {
            margin-right: 10px;
            text-decoration: none;
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Dashboard</h2>

<div class="card">
    <canvas id="chart"></canvas>
</div>

<br>

<div class="nav">
    <a href="/form">New Patient</a>
    <a href="/calendar">Visit Details</a>
</div>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Today', 'Week', 'Month', 'Year'],
        datasets: [
            {
                label: 'New Patients',
                backgroundColor: '#4CAF50',
                data: [
                    {{ day_new }},
                    {{ week_new }},
                    {{ month_new }},
                    {{ year_new }}
                ]
            },
            {
                label: 'Existing Patients',
                backgroundColor: '#2196F3',
                data: [
                    {{ day_existing }},
                    {{ week_existing }},
                    {{ month_existing }},
                    {{ year_existing }}
                ]
            }
        ]
    }
});
</script>

</body>
</html>
